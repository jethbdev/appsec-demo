rules:
  - id: prisma-query-raw-unsafe-any-call
    pattern-either:
      # Inline interpolated template literal
      - pattern: prisma.$queryRawUnsafe(`...`)
      # Variable passed as first argument (any single-string-arg call)
      - pattern: prisma.$queryRawUnsafe($SQL)
    pattern-not:
      # Allow the safe overload: $queryRawUnsafe(sql, ...params) where params are bound
      - pattern: prisma.$queryRawUnsafe($SQL, ...$PARAMS)
    message: |
      SQL Injection risk: `prisma.$queryRawUnsafe()` called with a raw SQL string.
      If the string contains any user-controlled input via interpolation, this is
      vulnerable to SQL injection.
      Use `prisma.$queryRaw` (tagged template literal) or the Prisma ORM API instead.
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      cwe: "CWE-89: SQL Injection"
      owasp: "A03:2021 - Injection"
